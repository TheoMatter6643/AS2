<html lang="en">
<head>

  <meta charset="UTF-8" />

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

<body>
  <header>
    <h1>Workforce Builder</h1>
    <div class="budget">
      Job: <span id="job-title">Loading...</span> • 
      Budget: <span id="budget-amount">$0/hr</span> • 
      Hires required: <span id="hire-count">0</span>
    </div>
  </header>

  <main>

  <!-- JOB DESCRIPTION FIRST -->
  <section class="job-panel">
    <h2>Job Description</h2>
    <div id="job-description"></div>
  </section>

  <!-- TWO-COLUMN PANEL -->
  <section class="game-panel">

    <div class="candidate-section">
      <h2>Candidate Pool</h2>
      <p class="hint">Drag candidates into the hired area. Choose exactly <span id="hire-count-inline">0</span>.</p>
      <div class="candidate-list" id="candidate-list"></div>
    </div>

    <div class="hired-section">
      <h2>Your Hires</h2>
      <p class="hint">Drop hired candidates here.</p>
      <div class="hired-dropzone empty" id="hired-dropzone"></div>
    </div>

  </section>

</main>


  <footer>
    <div class="summary">
      <span>Remaining Budget: <strong id="budget-remaining">$0/hr</strong></span>
      <span>Fit Score: <strong id="fit-score">0</strong></span>
      <span>Total Score: <strong id="total-score">0</strong></span>
    </div>
    <div>
      <button class="btn secondary" id="reset-btn">New Job</button>
      <button class="btn" id="check-btn">Evaluate Hires</button>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
